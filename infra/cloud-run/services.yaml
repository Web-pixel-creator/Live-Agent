defaults:
  platform: managed
  ingress: all
  allowUnauthenticated: true
  timeoutSeconds: 300
  maxInstances: 4
  minInstances: 0
  cpu: 1
  memory: 1Gi
  concurrency: 40
services:
  - name: orchestrator
    image: us-central1-docker.pkg.dev/{projectId}/multimodal-live-agent/orchestrator:{imageTag}
    port: 8082
    serviceAccount: mla-orchestrator-sa@{projectId}.iam.gserviceaccount.com
    allowUnauthenticated: false
    minInstances: 1
    maxInstances: 4
    concurrency: 20
    timeoutSeconds: 300
    cpu: 1
    memory: 1Gi
    env:
      PORT: "8082"
      ORCHESTRATOR_PORT: "8082"
      GOOGLE_CLOUD_PROJECT: "{projectId}"
      GOOGLE_CLOUD_REGION: "{region}"
      FIRESTORE_ENABLED: "true"
      FIRESTORE_DATABASE: "(default)"
      FIRESTORE_EVENT_RETENTION_DAYS: "14"
      FIRESTORE_SESSION_RETENTION_DAYS: "90"
      FIRESTORE_RUN_RETENTION_DAYS: "30"
      FIRESTORE_NEGOTIATION_RETENTION_DAYS: "365"
      FIRESTORE_STORY_ASSET_RETENTION_DAYS: "30"
      ANALYTICS_EXPORT_ENABLED: "true"
      ANALYTICS_EXPORT_METRICS_TARGET: "cloud_monitoring"
      ANALYTICS_EXPORT_EVENTS_TARGET: "bigquery"
      ANALYTICS_BIGQUERY_DATASET: "agent_analytics"
      ANALYTICS_LOG_NAME: "multimodal_analytics"
      ORCHESTRATOR_STORY_QUEUE_TELEMETRY_ENABLED: "true"
      ORCHESTRATOR_STORY_QUEUE_TELEMETRY_POLL_MS: "30000"
    secretEnv:
      GOOGLE_GENAI_API_KEY: GOOGLE_GENAI_API_KEY:latest
      GEMINI_API_KEY: GOOGLE_GENAI_API_KEY:latest
      ORCHESTRATOR_ASSISTIVE_ROUTER_API_KEY: GOOGLE_GENAI_API_KEY:latest

  - name: realtime-gateway
    image: us-central1-docker.pkg.dev/{projectId}/multimodal-live-agent/realtime-gateway:{imageTag}
    port: 8080
    serviceAccount: mla-gateway-sa@{projectId}.iam.gserviceaccount.com
    allowUnauthenticated: true
    minInstances: 1
    maxInstances: 6
    concurrency: 80
    timeoutSeconds: 300
    cpu: 1
    memory: 1Gi
    env:
      GATEWAY_PORT: "8080"
      GOOGLE_CLOUD_PROJECT: "{projectId}"
      GOOGLE_CLOUD_REGION: "{region}"
      ORCHESTRATOR_URL: "{orchestratorUrl}/orchestrate"
      LIVE_API_ENABLED: "true"
      LIVE_API_PROTOCOL: "gemini"
      LIVE_API_WS_URL: "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent"
      ANALYTICS_EXPORT_ENABLED: "true"
      ANALYTICS_EXPORT_METRICS_TARGET: "cloud_monitoring"
      ANALYTICS_EXPORT_EVENTS_TARGET: "bigquery"
      ANALYTICS_BIGQUERY_DATASET: "agent_analytics"
      ANALYTICS_LOG_NAME: "multimodal_analytics"
    secretEnv:
      LIVE_API_API_KEY: LIVE_API_API_KEY:latest
      LIVE_API_AUTH_HEADER: LIVE_API_AUTH_HEADER:latest
      GOOGLE_GENAI_API_KEY: GOOGLE_GENAI_API_KEY:latest
      GEMINI_API_KEY: GOOGLE_GENAI_API_KEY:latest
      LIVE_AGENT_GEMINI_API_KEY: GOOGLE_GENAI_API_KEY:latest

  - name: api-backend
    image: us-central1-docker.pkg.dev/{projectId}/multimodal-live-agent/api-backend:{imageTag}
    port: 8081
    serviceAccount: mla-api-sa@{projectId}.iam.gserviceaccount.com
    allowUnauthenticated: true
    minInstances: 1
    maxInstances: 4
    concurrency: 40
    timeoutSeconds: 300
    cpu: 1
    memory: 1Gi
    env:
      PORT: "8081"
      API_PORT: "8081"
      API_BASE_URL: "{apiUrl}"
      API_GATEWAY_BASE_URL: "{gatewayUrl}"
      API_ORCHESTRATOR_BASE_URL: "{orchestratorUrl}"
      ORCHESTRATOR_URL: "{orchestratorUrl}/orchestrate"
      GOOGLE_CLOUD_PROJECT: "{projectId}"
      GOOGLE_CLOUD_REGION: "{region}"
      FIRESTORE_ENABLED: "true"
      FIRESTORE_DATABASE: "(default)"
      ANALYTICS_EXPORT_ENABLED: "true"
      ANALYTICS_EXPORT_METRICS_TARGET: "cloud_monitoring"
      ANALYTICS_EXPORT_EVENTS_TARGET: "bigquery"
      ANALYTICS_BIGQUERY_DATASET: "agent_analytics"
      ANALYTICS_LOG_NAME: "multimodal_analytics"
      API_CORS_ALLOWED_ORIGINS: "*"
    secretEnv:
      GOOGLE_GENAI_API_KEY: GOOGLE_GENAI_API_KEY:latest
      GEMINI_API_KEY: GOOGLE_GENAI_API_KEY:latest
